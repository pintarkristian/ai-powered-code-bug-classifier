name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lightweight CI dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas scikit-learn fastapi pydantic uvicorn httpx pytest ruff black

      - name: Lint
        run: ruff check src app tests

      - name: Format check
        run: black --check src app tests

      - name: Test
        run: pytest tests -v
